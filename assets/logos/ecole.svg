<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <rect width="200" height="140" fill="#f0f4f8"/>
  <!-- Globe -->
  <circle cx="44" cy="85" r="28" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <ellipse cx="44" cy="85" rx="13" ry="28" fill="none" stroke="#1565c0" stroke-width="1.8"/>
  <line x1="16" y1="85" x2="72" y2="85" stroke="#1565c0" stroke-width="1.8"/>
  <!-- Books stack -->
  <rect x="122" y="78" width="58" height="13" rx="2" fill="#c62828"/>
  <rect x="125" y="65" width="53" height="13" rx="2" fill="#1565c0"/>
  <rect x="127" y="52" width="50" height="13" rx="2" fill="#2e7d32"/>
  <!-- Chalkboard -->
  <rect x="72" y="12" width="118" height="70" rx="4" fill="#1b5e20"/>
  <rect x="75" y="15" width="112" height="64" rx="2" fill="#2d7a33"/>
  <!-- "A B" on board -->
  <text x="131" y="55" font-family="Georgia,serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">A  B</text>
  <!-- French flag on board -->
  <rect x="79" y="19" width="8"  height="13" fill="#002395"/>
  <rect x="87" y="19" width="8"  height="13" fill="white"/>
  <rect x="95" y="19" width="8"  height="13" fill="#ED2939"/>
  <!-- Label -->
  <text x="100" y="130" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="middle" font-weight="600">Ecole Ivan Vazov</text>
</svg>
